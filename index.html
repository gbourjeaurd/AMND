<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Midsummer Night's Dream</title>

  <!-- CETEIcean: renders your TEI XML directly in the browser -->
  <script src="https://teic.github.io/CETEIcean/js/CETEI.js"></script>

  <style>
    /* ── Typefaces ──────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap');

    /* ── Reset & base ───────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0e8;
      color: #1a1208;
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 1rem;
      line-height: 1.7;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ── Page header ────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid #c8b99a;
      padding-bottom: 1.5rem;
    }
    header h1 {
      font-family: 'IM Fell English SC', serif;
      font-size: 2rem;
      letter-spacing: .04em;
      font-weight: normal;
    }
    header p {
      font-style: italic;
      color: #6b5740;
      font-size: 1.5rem;
      margin-top: .3rem;
    }

    /* ── Parallel columns ───────────────────────── */
    tei-div[type="parallel"] {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 960px;
      margin: 0 auto;
      border: 1px solid #c8b99a;
      background: #fff8ee;
    }

    tei-div[type="witness"] {
      display: block;
      padding: 1.8rem 2rem 2rem;
    }

    tei-div[type="witness"]:first-child {
      border-right: 1px solid #c8b99a;
    }

    /* ── Witness heading ────────────────────────── */
    tei-head {
      display: block;
      font-family: 'IM Fell English SC', serif;
      font-size: 1.2rem;
      letter-spacing: .08em;
      color: #6b5740;
      text-align: center;
      padding-bottom: .8rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid #e0d0b8;
    }

    /* ── Speech blocks ──────────────────────────── */
    tei-sp {
      display: block;
      margin-bottom: 1.4rem;
    }

    tei-speaker {
      display: block;
      font-family: 'IM Fell English SC', serif;
      font-size: .82rem;
      letter-spacing: .06em;
      color: #4a3828;
      margin-bottom: .25rem;
    }

    /* ── Verse lines ────────────────────────────── */
    tei-l {
      display: block;
      padding-left: 1.2rem;
      text-indent: -1.2rem; /* hanging indent for wrapped lines */
    }

    /* Line numbers via data attribute — optional */
    tei-l::before {
      content: attr(n);
      display: inline-block;
      width: 1.2rem;
      font-size: .7rem;
      color: #b0987c;
      vertical-align: middle;
      padding-right: .2rem;
      font-style: normal;
    }

    /* ── Typographic rendering ──────────────────── */
    tei-hi[rend="italic"]     { font-style: italic; }
    tei-hi[rend="small-caps"] { font-variant: small-caps; }
    
    /* ── Responsive: stack on mobile ───────────── */
    @media (max-width: 640px) {
      tei-div[type="parallel"] {
        grid-template-columns: 1fr;
      }
      tei-div[type="witness"]:first-child {
        border-right: none;
        border-bottom: 1px solid #c8b99a;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>A Midsummer Night's Dream</h1>
    <p>Textual Variants in V.i.1834–1881</p>
  </header>

  <div id="tei-content"></div>

  <script>
    const c = new CETEI();
    c.getHTML5("shakespeare.xml", function(data) {
      document.getElementById("tei-content").appendChild(data);
    });
  </script>

</body>
</html>
