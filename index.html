<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Midsummer Night's Dream</title>

  <!-- CETEIcean: renders your TEI XML directly in the browser -->
  <script src="https://teic.github.io/CETEIcean/js/CETEI.js"></script>

  <style>
    /* ── Typefaces ──────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

    @font-face {
      font-family: 'Anaktoria';
      src: url('Anaktoria.ttf') format('truetype');
    }

    /* ── Reset & base ───────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0e8;
      color: #1a1208;
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 1rem;
      line-height: 1.7;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ── Page header ────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid #c8b99a;
      padding-bottom: 1.5rem;
    }
    header h1 {
      font-family: 'IM Fell English SC', serif;
      font-size: 2rem;
      letter-spacing: .04em;
      font-weight: normal;
    }
    header p {
      font-style: italic;
      color: #6b5740;
      font-size: 1.5rem;
      margin-top: .3rem;
    }

    /* ── Parallel columns ───────────────────────── */
    tei-div[type="parallel"] {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 960px;
      margin: 0 auto;
      border: 1px solid #c8b99a;
      background: #fff8ee;
    }

    tei-div[type="witness"] {
      display: block;
      padding: 1.8rem 2rem 2rem;
    }

    tei-div[type="witness"]:first-child {
      border-right: 1px solid #c8b99a;
    }

    /* ── Witness heading ────────────────────────── */
    tei-head {
      display: block;
      font-family: 'IM Fell English SC', serif;
      font-size: 1.2rem;
      letter-spacing: .08em;
      color: #6b5740;
      text-align: center;
      padding-bottom: .8rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid #e0d0b8;
    }

    /* ── Speech blocks ──────────────────────────── */
    tei-sp {
      display: block;
      margin-bottom: 1.4rem;
    }

    tei-sp[rend="tight"] {
      margin-bottom: 0.08rem;
    }

    tei-speaker {
      display: block;
      font-family: 'Anaktoria', serif;
      font-size: 1.2rem;
      letter-spacing: .04em;
      color: #4a3828;
      margin-bottom: .25rem;
    }

    tei-sp[who="#THE"] tei-speaker  { color: #517596; }
    tei-sp[who="#PHIL"] tei-speaker { color: #886700; }
    tei-sp[who="#EGE"] tei-speaker  { color: #632C2B; }
    tei-sp[who="#LYS"] tei-speaker  { color: #445A28; }

    /* ── Verse lines ────────────────────────────── */
    tei-l {
      display: block;
      padding-left: 1.2rem;
      text-indent: -1.2rem;
    }

    tei-l::before {
      content: attr(n);
      display: inline-block;
      width: 1.2rem;
      font-size: .7rem;
      color: #b0987c;
      vertical-align: middle;
      padding-right: .2rem;
      font-style: normal;
    }

    tei-l[rend="right"] {
      text-align: right !important;
      padding-right: 20% !important;
      text-indent: 0 !important;
    }

    tei-l[rend="indent"] {
      padding-left: 1rem;
      text-indent: 0;
    }

    /* ── Stage directions ───────────────────────── */
    tei-stage {
      display: block;
      text-align: right;
      padding-right: 20%;
      font-style: italic;
      color: #6b5740;
      margin: .5rem 0;
    }

    tei-sp tei-stage {
      display: inline;
      text-align: left;
      padding-right: 0;
    }

    tei-l tei-stage[rend="right-near"] {
      float: right;
      margin-right: 10%;
      padding-left: 1rem;
      line-height: 1.7;
    }

    tei-l tei-stage[rend="right-far"] {
      float: right;
      margin-right: 25%;
      padding-left: 1rem;
    }

    tei-stage[rend="right-far"] {
      display: block;
      text-align: right;
      padding-right: 15%;
      color: #6b5740;
    }

    tei-stage[rend="right-far-normal"] {
      display: block;
      text-align: right;
      padding-right: 15%;
      color: #6b5740;
      font-style: normal;
    }
    
    tei-stage .tei-ref { font-style: normal; }

    tei-div[id="wit-JOHN"] tei-stage[rend="right-far"] {
      margin: -0.3rem 0 -0.7rem 0;
      padding: 0;
    }

    tei-div[id="wit-MAL"] tei-stage[rend="right-far"] {
      margin: -0.5rem 0 -0.05rem 0;
      padding: 0;
    }

    /* ── Typographic rendering ──────────────────── */
    tei-hi[rend="italic"]     { font-style: italic; }
    tei-hi[rend="small-caps"] { font-size: 0.70em; letter-spacing: 0.05em; }
    tei-hi[rend="large"] { font-size: 1.3em; }

    .tei-note[data-rend="large"]::before { font-size: 1.5em; }


    /* ── Segmented layout (notes) ───────────────── */
    .tei-seg[data-rend="right-far"]  { display: block; text-align: right; padding-right: 15%; }
    .tei-seg[data-rend="right-near"] { display: block; text-align: right; padding-right: 40%; }
    .tei-seg[data-rend="centre"]     { display: block; text-align: center; }
    .tei-seg[data-rend="indent"]     { display: block; padding-left: 35%; }

    /* ── Footnote refs in text ──────────────────── */
    .tei-ref {
      cursor: pointer;
      color: #6b5740;
      font-size: 0.85em;
      border-bottom: 1px dotted #6b5740;
    }
    .tei-ref:hover { color: #1a1208; }

    tei-div[xml\\:id="wit-THEO"] .tei-ref {
      vertical-align: super;
      font-size: 0.75em;
    }

    tei-div[xml\\:id="wit-THEO"] .tei-note::before {
      content: "(" attr(data-n) ") ";
      font-weight: bold;
    }

    tei-div[xml\\:id="wit-THEO"] .tei-ref::before { content: "("; }
    tei-div[xml\\:id="wit-THEO"] .tei-ref::after  { content: ")"; }

    tei-div[id="wit-MAL"] .tei-ref {
      vertical-align: super;
      line-height: 0;
    }

 

    /* ── Notes section ──────────────────────────── */
    tei-div[type="notes"] {
      margin-top: 2rem;
      border-top: 1px solid #e0d0b8;
      padding-top: 1rem;
    }

    tei-note {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      padding-left: 1.5rem;
      text-indent: -1.5rem;
    }

    .tei-note::before {
      content: attr(data-n) " ";
      font-weight: bold;
    }

    tei-div[id="wit-JOHN"] tei-note {
      line-height: 1.3 !important;
      margin-bottom: 0.7rem !important;
    }

    tei-div[id="wit-MAL"] tei-note {
      line-height: 1.3 !important;
      margin-bottom: 0.7rem !important;
    }

    tei-div[id="wit-THEO"] tei-note {
        line-height: 1.3 !important;
        margin-bottom: 0.7rem !important;
    }

    
    /* ── Responsive: stack on mobile ───────────── */
    @media (max-width: 640px) {
      tei-div[type="parallel"] {
        grid-template-columns: 1fr;
      }
      tei-div[type="witness"]:first-child {
        border-right: none;
        border-bottom: 1px solid #c8b99a;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>A Midsummer Night's Dream</h1>
    <p>Textual Variants | V.i.1834–1881</p>
  </header>

  <div id="tei-content"></div>

  <script>
    const c = new CETEI();
    c.addBehaviors({
      "tei": {
      "note": ["<span class='tei-note' id='$@xml:id' data-n='$@n' data-rend='$@rend'>", "</span>"],
      "ref": ["<span class='tei-ref' data-target='$@target'>", "</span>"],
      "seg": ["<div class='tei-seg' data-rend='$@rend'>", "</div>"]
      }
    });
    c.getHTML5("shakespeare.xml", function(data) {
      document.getElementById("tei-content").appendChild(data);

      document.querySelectorAll(".tei-ref").forEach(function(ref) {
        ref.addEventListener("click", function() {
          const target = this.getAttribute("data-target").replace("#", "");
          const note = document.getElementById(target);
          if (note) {
            note.scrollIntoView({ behavior: "smooth" });
            note.style.background = "#f0e8d8";
            setTimeout(function() { note.style.background = ""; }, 1500);
          }
        });
      });
    });
  </script>

</body>
</html>
